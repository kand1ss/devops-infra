name: Build and push apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes != '' && steps.filter.outputs.changes || '[]' }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          APPS=$(find apps -mindepth 1 -maxdepth 1 -type d -exec test -e '{}/Dockerfile' \; -print | xargs -n1 basename)
          
          echo "filters<<EOF" >> "$GITHUB_OUTPUT"
          for app in $APPS; do
            echo "$app: 'apps/$app/**'" >> "$GITHUB_OUTPUT"
          done
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: ${{ steps.set-matrix.outputs.filters }}

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]' && needs.detect-changes.outputs.apps != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false 
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.app }}
          push: true
          tags: ghcr.io/kand1ss/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  bump-tag:
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.apps != '[]' && needs.detect-changes.outputs.apps != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install pyyaml

      - name: Bump changed image tags in values.yaml
        env:
          CHANGED_APPS: ${{ needs.detect-changes.outputs.apps }}
          TAG: ${{ github.sha }}
        run: |
          python -c "
          import yaml, os, json

          changed_apps = json.loads(os.environ['CHANGED_APPS'])
          tag = os.environ['TAG']

          with open('values.yaml', 'r') as f:
              data = yaml.safe_load(f) or {}

          for app in changed_apps:
              if app not in data:
                  data[app] = {}
              data[app]['image_tag'] = tag
              print(f'Updated {app} image_tag to {tag}')

          with open('values.yaml', 'w') as f:
              yaml.safe_dump(data, f, sort_keys=False)
          "

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore(config): bump tags"
          title: "chore(config): bump image tags to ${{ github.sha }}"
          branch: "chore/auto-bump-tags"
          sign-commits: true

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --auto --squash "chore/auto-bump-tags"

name: Build and push apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          APPS=$(find apps -mindepth 1 -maxdepth 1 -type d -exec test -e '{}/Dockerfile' \; -print | xargs -n1 basename)
          
          echo "filters<<EOF" >> "$GITHUB_OUTPUT"
          for app in $APPS; do
            echo "$app: 'apps/$app/**'" >> "$GITHUB_OUTPUT"
          done
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: ${{ steps.set-matrix.outputs.filters }}

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]' && needs.detect-changes.outputs.apps != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false 
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.app }}
          push: true
          tags: ghcr.io/kand1ss/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  bump-tag:
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.apps != '[]' && needs.detect-changes.outputs.apps != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install pyyaml

      - name: Bump changed image tags in values.yaml
        env:
          CHANGED_APPS: ${{ needs.detect-changes.outputs.apps }}
          TAG: ${{ github.sha }}
        run: |
          python -c "
          import yaml, os, json

          changed_apps = json.loads(os.environ['CHANGED_APPS'])
          tag = os.environ['TAG']

          with open('values.yaml', 'r') as f:
              data = yaml.safe_load(f) or {}

          for app in changed_apps:
              if app not in data:
                  data[app] = {}
              data[app]['image_tag'] = tag
              print(f'Updated {app} image_tag to {tag}')

          with open('values.yaml', 'w') as f:
              yaml.safe_dump(data, f, sort_keys=False)
          "

      - name: Commit and push changes (Verified)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(config): bump changed apps tags to ${{ github.sha }} [skip ci]"
          file_pattern: "values.yaml"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"

name: Manual Deploy via Tailscale

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Target Server IP (Tailscale IP or MagicDNS name)'
        required: true
        type: string
        default: '100.x.y.z' 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:deployment 

      - name: Check server reachability
        env:
          SERVER_IP: ${{ inputs.server_ip }}
        run: |
          echo "Target IP: $SERVER_IP"
          ping -c 3 $SERVER_IP

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r deploy/requirements.txt

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: read

      - name: Write SSH key to temp file
        run: |
          umask 077
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Run PyInfra Deploy
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REMOTE_REPO_NAME: "devops-infra"
          SERVER_IP: ${{ inputs.server_ip }}
          TSKEY_AUTH: ${{ secrets.TS_INFRA_KEY }}
        run: |
          pyinfra "$SERVER_IP" deploy/deploy.py \
            --user ${{ secrets.SERVER_USER }} \
            --key /tmp/deploy_key

      - name: Clean up SSH key
        if: always()
        run: rm -f /tmp/deploy_key

global:
  scrape_interval: 5s
  external_labels:
    monitor: 'test-app-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'shortener-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['shortener:8000']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
